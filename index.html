<!DOCTYPE html>
<html lang="de">
<head>
<link rel="manifest" href="manifest.json">

<meta charset="UTF-8">
<meta name="theme-color" content="#4a90e2">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zufallsdatum Trainer</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 400px;
    margin: 30px auto;
    padding: 15px;
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 12px;
    box-sizing: border-box;
    font-size: 16px;
}

#dateDisplay {
    font-size: 28px;
    font-weight: bold;
    margin: 20px 0;
}

#result {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
}

.correct {
    color: green;
}

.wrong {
    color: red;
}

#timer {
    margin-top: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>Zufallsdatum Trainer</h1>

<label>Jahresspanne (+/-)</label>
<input type="number" id="years" value="50">

<button id="generateBtn">Datum generieren</button>

<div id="dateDisplay"></div>

<select id="weekday">
    <option value="">Wochentag auswählen</option>
    <option>Montag</option>
    <option>Dienstag</option>
    <option>Mittwoch</option>
    <option>Donnerstag</option>
    <option>Freitag</option>
    <option>Samstag</option>
    <option>Sonntag</option>
</select>

<button id="checkBtn">Überprüfen</button>

<div id="result"></div>
<div id="timer"></div>

<!-- =========================
     SERVICE WORKER REGISTRIERUNG
========================= -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log("Service Worker aktiv"))
        .catch(err => console.log("SW Fehler:", err));
}
</script>

<!-- =========================
     APP LOGIK
========================= -->
<script>

let generatedDate = null;
let startTime = null;

const weekdays = {
    0: "Sonntag",
    1: "Montag",
    2: "Dienstag",
    3: "Mittwoch",
    4: "Donnerstag",
    5: "Freitag",
    6: "Samstag"
};

function generateDate() {

    const years = parseInt(document.getElementById("years").value);

    if (isNaN(years)) {
        document.getElementById("result").textContent =
            "Bitte gültige Zahl eingeben!";
        return;
    }

    const today = new Date();

    const startDate = new Date(today);
    startDate.setFullYear(today.getFullYear() - years);

    const endDate = new Date(today);
    endDate.setFullYear(today.getFullYear() + years);

    const randomTime =
        startDate.getTime() +
        Math.random() * (endDate.getTime() - startDate.getTime());

    generatedDate = new Date(randomTime);

    const day = String(generatedDate.getDate()).padStart(2, "0");
    const month = String(generatedDate.getMonth() + 1).padStart(2, "0");
    const year = generatedDate.getFullYear();

    document.getElementById("dateDisplay").textContent =
        `${day}.${month}.${year}`;

    document.getElementById("result").textContent = "";
    document.getElementById("timer").textContent = "";

    startTime = performance.now();

    // UX: direkt ins Dropdown springen
    document.getElementById("weekday").focus();
}

function checkDay() {

    if (!generatedDate) {
        document.getElementById("result").textContent =
            "Bitte zuerst ein Datum generieren!";
        return;
    }

    const selected =
        document.getElementById("weekday").value;

    const actual =
        weekdays[generatedDate.getDay()];

    const result =
        document.getElementById("result");

    const elapsed =
        ((performance.now() - startTime) / 1000).toFixed(2);

    document.getElementById("timer").textContent =
        `Zeit: ${elapsed} Sekunden`;

    if (selected === actual) {
        result.textContent = "Richtig! 🎉";
        result.className = "correct";
    } else {
        result.textContent = `Falsch! Es war ${actual}`;
        result.className = "wrong";
    }
}

document.getElementById("generateBtn")
    .addEventListener("click", generateDate);

document.getElementById("checkBtn")
    .addEventListener("click", checkDay);

document.getElementById("years")
    .addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            generateDate();
        }
    });

</script>

</body>
</html>
