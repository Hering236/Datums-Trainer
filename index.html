<meta name="theme-color" content="#4a90e2">

<title>Trainer App</title>

<style>
body {
    font-family: Arial;
    max-width: 450px;
    margin: auto;
    padding: 15px;
    text-align: center;
}

.screen { display: none; }
.active { display: block; }

button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    font-size: 16px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    font-size: 16px;
    box-sizing: border-box;
}

h1 {
    margin-bottom: 15px;
}

.card {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 12px;
    margin: 10px 0;
}

.correct { color: green; font-weight: bold; }
.wrong { color: red; font-weight: bold; }

.big {
    font-size: 26px;
    margin: 10px 0;
}
</style>

</head>

<!-- ================= NEU: START / MODUL WAHL ================= -->
<div id="start_screen" class="screen active">
    <h1>Was möchtest du trainieren?</h1>

    <div class="card">
        <button onclick="showScreen('date_menu')">📅 Datums-Trainer</button>
		<button onclick="showScreen('flags_menu')">🏳️ Flaggen Trainer</button>

<!-- ================= DATE ================= -->

<!-- ================= ÜBEN ================= -->

<!-- ================= APP LOGIK ================= -->
<script>

// NAVIGATION
function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function openTrainer(type) {
    showScreen("trainer_" + type);
}

// ================= TRAINING (UNVERÄNDERT) =================
let generatedDate = null;
let startTime = null;

function generateDate() {
    const years = parseInt(document.getElementById("years").value);

    const today = new Date();
    const start = new Date(today);
    start.setFullYear(today.getFullYear() - years);

    const end = new Date(today);
    end.setFullYear(today.getFullYear() + years);

    generatedDate = new Date(
        start.getTime() + Math.random() * (end - start)
    );

    document.getElementById("dateDisplay").textContent =
        generatedDate.toLocaleDateString("de-DE");

    startTime = performance.now();
}

function checkDay() {
    const days = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
    const actual = days[generatedDate.getDay()];
    const selected = document.getElementById("weekday").value;

    const time = ((performance.now()-startTime)/1000).toFixed(2);

    document.getElementById("timer").textContent = time + "s";

    document.getElementById("result").textContent =
        selected === actual ? "Richtig! 🎉" : "Falsch! " + actual;
}

// ================= MONAT (UNVERÄNDERT) =================
const monthMap = [
    {name:"Januar", value:6},
    {name:"Februar", value:2},
    {name:"März", value:2},
    {name:"April", value:5},
    {name:"Mai", value:0},
    {name:"Juni", value:3},
    {name:"Juli", value:5},
    {name:"August", value:1},
    {name:"September", value:4},
    {name:"Oktober", value:6},
    {name:"November", value:2},
    {name:"Dezember", value:4}
];

let currentMonth = null;
let monthStart = 0;

function generateMonth() {
    currentMonth = monthMap[Math.floor(Math.random()*12)];

    document.getElementById("monthDisplay").textContent =
        currentMonth.name;
		
	document.getElementById("monthResult").textContent = "";

    monthStart = performance.now();
	
	document.getElementById("monthInput").value = "";
}

function checkMonth() {
    const val = parseInt(document.getElementById("monthInput").value);

    const time = ((performance.now()-monthStart)/1000).toFixed(2);

    document.getElementById("monthTimer").textContent = time + "s";

    document.getElementById("monthResult").textContent =
        val === currentMonth.value ? "Richtig! 🎉" : "Falsch! " + currentMonth.value;
}

// ================= DIV 4 (UNVERÄNDERT) =================
let div4Number = 0;

function generateDiv4() {
    div4Number = Math.floor(Math.random()*99)+1;
    document.getElementById("div4Number").textContent = div4Number;
	
	// 🆕 CLEAR INPUT
	document.getElementById("div4Input").value = "";
}

function checkDiv4() {
    const ans = parseInt(document.getElementById("div4Input").value);
    const correct = Math.floor(div4Number/4);

    document.getElementById("div4Result").textContent =
        ans === correct ? "Richtig! 🎉" : "Falsch! " + correct;
}

// ================= MOD 7 (UNVERÄNDERT) =================
let mod7Number = 0;

function generateMod7() {

    const x = Math.floor(Math.random() * 100);
    mod7Number = x + Math.floor(x / 4);

    document.getElementById("mod7Number").textContent = mod7Number;
	
	// 🆕 CLEAR INPUT
    document.getElementById("mod7Input").value = "";
}

function checkMod7() {
    const ans = parseInt(document.getElementById("mod7Input").value);
    const correct = mod7Number % 7;

    document.getElementById("mod7Result").textContent =
        ans === correct ? "Richtig! 🎉" : "Falsch! " + correct;
}

// ================= GAME LOGIK =================

let gameTime = 60;
let gamePoints = 0;
let gameEndTime = 0;
let currentDate = null;
let gameCorrect = 0;
let gameWrong = 0;
let lastWrong = null;
let gameStartTime = 0;
let gameLog = [];

function startDate_Game() {

    const range = parseInt(document.getElementById("range").value);
    gameTime = parseInt(document.getElementById("timeLimit").value);

    gamePoints = 0;
    gameCorrect = 0;
    gameWrong = 0;

    gameLog = []; // 🆕 LOG RESET

    showScreen("date_game");

    gameStartTime = Date.now();
    gameEndTime = gameStartTime + gameTime * 1000;

    nextGameTask(range);
    startDateGameTimer();
}

function nextGameTask(range) {

    const today = new Date();

    const start = new Date(today);
    start.setFullYear(today.getFullYear() - range);

    const end = new Date(today);
    end.setFullYear(today.getFullYear() + range);

    currentDate = new Date(
        start.getTime() + Math.random() * (end - start)
    );

    document.getElementById("gameTask").textContent =
        currentDate.toLocaleDateString("de-DE");

    // Dropdown reset
    document.getElementById("gameWeekday").value = "";
}

function check_Date_Game() {

    const days = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];

    const selected = document.getElementById("gameWeekday").value;
    const actual = days[currentDate.getDay()];

    const isCorrect = selected === actual;

    if (isCorrect) {
        gameCorrect++;
    } else {
        gameWrong++;

        // 🆕 FEHLER INS LOG
        gameLog.push({
            date: currentDate.toLocaleDateString("de-DE"),
            selected: selected,
            correct: actual
        });
    }

    nextGameTask(parseInt(document.getElementById("range").value));
}

function startDateGameTimer() {

    const interval = setInterval(() => {

        const remaining = gameEndTime - Date.now();

        document.getElementById("gameInfo").textContent =
            "Zeit: " + Math.max(0, Math.ceil(remaining / 1000)) +
            "s | Richtig: " + gameCorrect +
            " | Falsch: " + gameWrong;

        if (remaining <= 0) {
            clearInterval(interval);
            end_Date_Game();
        }

    }, 250);
}

function end_Date_Game() {

    const duration = ((Date.now() - gameStartTime) / 1000).toFixed(1);

    let html = `
        <p><b>Zeit:</b> ${duration}s</p>
        <p><b>Richtig:</b> ${gameCorrect}</p>
        <p><b>Falsch:</b> ${gameWrong}</p>
    `;

    // 🆕 GAME LOG AUSGABE
    if (gameLog.length > 0) {

        html += `<hr><h3>Fehler-Log</h3>`;

        gameLog.forEach((entry, index) => {
            html += `
                <div style="text-align:left; margin-bottom:8px;">
                    <b>#${index + 1}</b><br>
                    Datum: ${entry.date}<br>
                    Deine Antwort: ${entry.selected}<br>
                    Richtig: ${entry.correct}
                </div>
            `;
        });
    } else {
        html += `<p>Keine Fehler 🎉</p>`;
    }

    document.getElementById("endStatsDate").innerHTML = html;

    showScreen("Date_game_End");
}

</script>

let flagPool = [];
let currentFlag = null;
let flagIndex = 0;
let usedFlags = [];

// ❗ NEU: getrennte Timer sauber
let flagStartTimeGame = 0;
let flagStartTimePractice = 0;

// ❗ NEU: Schutz gegen alte Intervalle
let flagGameInterval = null;

// ================= REGION TOGGLE =================

function toggleAllFlags(checkbox) {
    const all = checkbox.checked;

    const container = checkbox.closest(".screen");

    container.querySelectorAll(".regionPractice, .regionGame")
        .forEach(cb => {
            cb.checked = all;
            cb.disabled = all;
        });
}

// ================= UI MODE SWITCH =================

function applyFlagModeUI() {
    const btn = document.getElementById("showAnswerBtnPractice");

    if (!btn) return;

    btn.style.display = (flagMode === "game") ? "none" : "block";
}

// ================= DATENLISTE =================

function loadCountriesGame() {
    const input = document.getElementById("flagInputGame");
    const list = document.getElementById("countryListGame");

    const query = input.value.trim().toLowerCase();
    list.innerHTML = "";

    // 🔒 NEU: erst ab 1 Zeichen Vorschläge zeigen
    if (query.length < 1) return;

    const source = flagPool.filter(f =>
        f.name.toLowerCase().startsWith(query)
    );

    source.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f.name;
        list.appendChild(opt);
    });
}

function loadCountriesPractice() {
    const input = document.getElementById("flagInputPractice");
    const list = document.getElementById("countryListPractice");

    const query = input.value.trim().toLowerCase();
    list.innerHTML = "";

    const source = query.length === 0
        ? flagPool
        : flagPool.filter(f => f.name.toLowerCase().startsWith(query));

    source.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f.name;
        list.appendChild(opt);
    });
}

// ================= NEXT FLAG IN GAME =================

function nextFlagGame() {
    document.getElementById("flagResultGame").textContent = "";

    const available = flagPool.filter(f => !usedFlags.includes(f.code));
    if (available.length === 0) return endFlagGame();

    currentFlag = available[Math.floor(Math.random() * available.length)];
    usedFlags.push(currentFlag.code);

    document.getElementById("flagDisplayGame").innerHTML = `
        <div style="display:inline-block;padding:12px;background:#f5f5f5;border:2px solid #ddd;border-radius:12px;">
            <img src="flags/${currentFlag.code}.png" style="width:180px;">
        </div>
    `;

	document.getElementById("flagInputGame").disabled = false;
	document.getElementById("flagInputGame").value = "";
	document.getElementById("skipBtnGame").disabled = false;
	document.getElementById("okBtnGame").disabled = true;
	document.getElementById("nextBtnGame").disabled = true;

    updateFlagCounter();
    loadCountriesGame();
}

// ================= NEXT FLAG IN PRACTICE =================

function nextFlagPractice() {
    document.getElementById("flagResultPractice").textContent = "";

    const available = flagPool.filter(f => !usedFlags.includes(f.code));
    if (available.length === 0) return endFlagPractice();

    currentFlag = available[Math.floor(Math.random() * available.length)];
    usedFlags.push(currentFlag.code);

    document.getElementById("flagDisplayPractice").innerHTML = `
        <div style="display:inline-block;padding:12px;background:#f5f5f5;border:2px solid #ddd;border-radius:12px;">
            <img src="flags/${currentFlag.code}.png" style="width:180px;">
        </div>
    `;

    document.getElementById("flagInputPractice").value = "";

    updateFlagCounter();
    loadCountriesPractice();
}

// ================= CHECK =================

function checkFlagGame() {
    const input = document.getElementById("flagInputGame");
    const value = input.value.trim();
    if (!currentFlag) return;

    if (value.toLowerCase() === currentFlag.name.toLowerCase()) {
        document.getElementById("flagResultGame").textContent = "richtig";
        flagIndex++;
    } else {
        document.getElementById("flagResultGame").textContent =
            "falsch, richtig war: " + currentFlag.name;
    }

    // 🔒 NEU: Eingabe sperren nach Antwort
    input.disabled = true;
	document.getElementById("nextBtnGame").disabled = false;
	document.getElementById("skipBtnGame").disabled = true;
}

function skipFlagGame() {
    if (!currentFlag) return;

    // zählt als falsch
    document.getElementById("flagResultGame").textContent =
        "übersprungen, richtig war: " + currentFlag.name;

    gameWrong++;

    // Eingabe wird wie nach OK gesperrt
    const input = document.getElementById("flagInputGame");
    input.disabled = true;

    // Buttons umschalten
    document.getElementById("okBtnGame").disabled = true;
    document.getElementById("skipBtnGame").disabled = true;
    document.getElementById("nextBtnGame").disabled = false;
}

function checkFlagPractice() {
    const input = document.getElementById("flagInputPractice").value.trim();
	if (!input) return; // 🔒 extra Schutz
    if (!currentFlag) return;

    if (input.toLowerCase() === currentFlag.name.toLowerCase()) {
        document.getElementById("flagResultPractice").textContent = "richtig";
        flagIndex++;
    } else {
        document.getElementById("flagResultPractice").textContent =
            "falsch, richtig war: " + currentFlag.name;
    }
}

// ================= SHOW ANSWER =================

function showFlagAnswerPractice() {
    if (!currentFlag) return;

    document.getElementById("flagResultPractice").textContent =
        "Lösung: " + currentFlag.name;
}

// ================= COUNTER =================

function updateFlagCounter() {
    const elGame = document.getElementById("flagCounterGame");
    const elPractice = document.getElementById("flagCounterPractice");

    if (elGame) elGame.textContent = usedFlags.length + " / " + flagPool.length;
    if (elPractice) elPractice.textContent = usedFlags.length + " / " + flagPool.length;
}

// ================= END GAME =================

let flagStartTime = 0;

function startFlagGame() {
    flagMode = "game";

    const selected = [];

    document.querySelectorAll(".regionGame:checked").forEach(cb => {
        selected.push(cb.value);
    });

    if (selected.length === 0) {
        alert("Bitte mindestens eine Region auswählen");
        return;
    }

    flagPool = flagData.filter(f => selected.includes(f.region));

    usedFlags = [];
    flagIndex = 0;

    // ❗ FIX: alter Timer stoppen
    if (flagGameInterval) clearInterval(flagGameInterval);

    flagStartTimeGame = Date.now();

    showScreen("flags_game");
    nextFlagGame();

    applyFlagModeUI();
}

function endFlagGame() {

    const durationRaw = (Date.now() - flagStartTimeGame) / 1000;

    // ❗ Schutz gegen kaputte Werte
    const duration = isFinite(durationRaw) && durationRaw > 0
        ? durationRaw.toFixed(1)
        : "0.0";

    const html = `
        <p><b>Zeit:</b> ${duration}s</p>
        <p><b>Richtig beantwortet:</b> ${flagIndex}</p>
        <p><b>Gesamt:</b> ${flagPool.length}</p>
    `;

    document.getElementById("endStatsFlagGame").innerHTML = html;

    showScreen("Flag_game_End");
}

// ================= START PRACTICE =================

function startFlagPractice() {
    flagMode = "practice";

    const selected = [];

    document.querySelectorAll(".regionPractice:checked").forEach(cb => {
        selected.push(cb.value);
    });

    if (selected.length === 0) {
        alert("Bitte mindestens eine Region auswählen");
        return;
    }

    flagPool = flagData.filter(f => selected.includes(f.region));

    usedFlags = [];
    flagIndex = 0;

    // ❗ FIX: Timer getrennt
    flagStartTimePractice = Date.now();

    showScreen("flags_practice");
    nextFlagPractice();

    applyFlagModeUI();
}

function endFlagPractice() {

    const durationRaw = (Date.now() - flagStartTimePractice) / 1000;

    const duration = isFinite(durationRaw) && durationRaw > 0

    const html = `
        <p><b>Zeit:</b> ${duration}s</p>
        <p><b>Richtig beantwortet:</b> ${flagIndex}</p>
        <p><b>Gesamt:</b> ${flagPool.length}</p>
    `;

    document.getElementById("endStatsFlagPractice").innerHTML = html;

    showScreen("Flag_practice_End");
}

document.getElementById("flagInputGame").addEventListener("input", (e) => {
    const value = e.target.value.trim().toLowerCase();
    const exactMatch = flagPool.some(f => f.name.toLowerCase() === value);

    if (!exactMatch) loadCountriesGame();
    
    updateOkButtons(); // 🆕
});

document.getElementById("flagInputPractice").addEventListener("input", (e) => {
    const value = e.target.value.trim().toLowerCase();
    const exactMatch = flagPool.some(f => f.name.toLowerCase() === value);

    updateOkButtons(); // 🆕
